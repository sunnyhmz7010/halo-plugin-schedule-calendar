name: Feature Request / 功能建议
description: Suggest a new feature or improvement / 提交新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.
        感谢你提出建议。

        Please describe the use case first, then the proposed solution.
        请先说明使用场景，再描述你希望的改进方案。

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case / 问题或场景
      description: What problem are you trying to solve? / 你想解决什么问题？
      placeholder: Describe the scenario or workflow you want to improve. / 描述你想改善的场景或流程。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution / 期望方案
      description: What would you like the plugin to do? / 你希望插件怎么做？
      placeholder: Describe the feature or behavior you want. / 描述你希望新增的功能或行为。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 替代方案
      description: Have you considered any workaround or alternative approach? / 是否考虑过其他做法或临时方案？

  - type: dropdown
    id: area
    attributes:
      label: Related Area / 相关模块
      options:
        - Admin console / 后台控制台
        - Public page / 前台页面
        - Editor schedule card / 编辑器日程卡片
        - Finder API
        - Public REST API / 公开 REST API
        - Backup and restore / 备份与恢复
        - Permissions / 权限
        - Documentation / 文档
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context / 补充信息
      description: Add screenshots, mockups, links, or other references if helpful. / 可补充截图、示意图、链接或其他参考信息。

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this request. / 我已先搜索过现有 Issue。
          required: true
