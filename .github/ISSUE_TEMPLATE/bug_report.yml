name: Bug Report / 缺陷反馈
description: Report a reproducible bug in the plugin / 提交可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        感谢你反馈问题。

        A short description and simple reproduction steps are enough.
        简单描述问题，加上复现步骤就可以。

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary / 问题概述
      description: Describe the issue clearly and concisely. / 请简要描述问题。
      placeholder: What went wrong? / 出现了什么问题？
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area / 影响范围
      description: Which part of the plugin is affected? / 问题出现在哪一部分？
      options:
        - Admin console / 后台控制台
        - Public page / 前台页面
        - Editor schedule card / 编辑器日程卡片
        - Finder API
        - Public REST API / 公开 REST API
        - Backup and restore / 备份与恢复
        - Permissions / 权限
        - Other / 其他

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: If possible, list the shortest steps to reproduce it. / 如方便，请提供最小复现步骤。
      placeholder: |
        1. Go to ... / 进入 ...
        2. Click ... / 点击 ...
        3. See error ... / 出现 ...

  - type: textarea
    id: context
    attributes:
      label: Additional Context / 补充信息
      description: Logs, screenshots, Halo version, plugin version, browser, device, or anything else helpful. / 可补充日志、截图、Halo 版本、插件版本、浏览器、设备等信息。

  - type: input
    id: halo-version
    attributes:
      label: Halo Version / Halo 版本
      placeholder: e.g. 2.23.2

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version / 插件版本
      placeholder: e.g. 2.4.0

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this report. / 我已先搜索过现有 Issue。
        - label: I have removed sensitive information from logs and screenshots. / 我已移除日志和截图中的敏感信息。
