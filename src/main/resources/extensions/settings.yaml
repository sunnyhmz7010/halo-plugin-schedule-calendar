apiVersion: v1alpha1
kind: Setting
metadata:
  name: schedule-calendar-settings
spec:
  forms:
    - group: public_page
      label: 基本设置
      formSchema:
        - $formkit: text
          name: title
          label: 前台页面标题
          value: 日程日历
          help: 用于前台 /schedule-calendar 路由页面的标题和页头文案
        - $formkit: repeater
          name: externalCalendars
          label: 外部日历订阅
          help: 可添加 Google Calendar 等支持 iCal / ICS 订阅地址的只读外部日历源
          value: []
          children:
            - $formkit: text
              name: name
              label: 日历名称
              value: Google Calendar
              help: 用于前台和摘要中的来源标识
            - $formkit: url
              name: icsUrl
              label: ICS 订阅地址
              help: 填写 Google Calendar 导出的 iCal / ICS 订阅地址
            - $formkit: text
              name: color
              label: 默认颜色
              value: "#4285f4"
              help: 可选，外部日历事项未自带颜色时使用
            - $formkit: checkbox
              name: enabled
              label: 启用
              value: true
        - $formkit: text
          name: publicIcalSubscriptionUrl
          label: 公开 iCal 订阅地址
          value: /schedule-calendar.ics
          help: 固定公开地址，当前公开 iCal 订阅不包含外部日历订阅数据
