apiVersion: v1alpha1
kind: Setting
metadata:
  name: schedule-calendar-settings
spec:
  forms:
    - group: public_page
      label: 前台页面
      formSchema:
        - $formkit: text
          name: title
          label: 页面标题
          value: 日程日历
          help: 用于前台 /schedule-calendar 路由页面的标题和页头文案
        - $formkit: text
          name: icon
          label: 页面图标
          value: 📅
          help: 用于前台 /schedule-calendar 页面标题前展示的图标，可填写 emoji 或单个符号
